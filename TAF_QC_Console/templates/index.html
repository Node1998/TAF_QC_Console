<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TAF QC</title>
<style>
  :root{
    --ink:#1d1d1f; --muted:#6e6e73; --hair:#d2d2d7; --panel:#f5f5f7;
    --blue:#0071e3; --blue-dark:#0064c8;
    --pass:#008a26; --review:#b25000; --fail:#e30000;
    --crit-bg:#ffe5e5; --err-bg:#ffefdb; --warn-bg:#fff7d6;
    --crit:#e30000; --err:#c93400; --warn:#8a6d00;
    --mono:"SF Mono",ui-monospace,"Cascadia Code",Consolas,Menlo,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --r-card:18px; --r-pill:980px;
  }
  *{box-sizing:border-box;margin:0}
  html{scroll-behavior:smooth}
  body{background:#fff;color:var(--ink);font-family:var(--sans);font-size:17px;line-height:1.47;-webkit-font-smoothing:antialiased}
  /* ---- nav ---------------------------------------------------------- */
  nav{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.8);backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid rgba(0,0,0,.08)}
  .nav-in{max-width:980px;margin:0 auto;height:48px;display:flex;align-items:center;gap:28px;padding:0 22px}
  .nav-in b{font-size:15px;font-weight:600}
  .nav-in a{color:var(--ink);opacity:.8;text-decoration:none;font-size:13px}
  .nav-in a:hover{opacity:1;color:var(--blue)}
  .zulu{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--muted)}
  /* ---- hero --------------------------------------------------------- */
  .hero{text-align:center;padding:64px 22px 40px}
  .hero h1{font-size:clamp(40px,6vw,56px);font-weight:600;letter-spacing:-.015em}
  .hero p{color:var(--muted);font-size:21px;margin-top:8px}
  .wrap{max-width:980px;margin:0 auto;padding:0 22px 96px}
  section{margin-top:28px}
  .card{background:var(--panel);border-radius:var(--r-card);padding:28px 30px}
  .card.white{background:#fff;border:1px solid var(--hair)}
